<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>拍立怼 Snap Roast Buddy</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="product-body">
    <main class="product-app" aria-label="Snap Roast Buddy 产品模式">
      <section id="cameraScreen" class="phone-screen camera-screen">
        <header class="product-topbar">
          <a class="product-back" href="./index.html" aria-label="返回测试界面">测试页</a>
          <div class="product-title">
            <p class="product-kicker">Snap Roast Buddy</p>
            <h1>拍立怼</h1>
          </div>
          <div class="top-actions">
            <button id="sketchToggleButton" class="icon-button sketch-toggle" type="button" aria-label="漫画开关">
              <span class="sketch-icon" aria-hidden="true"></span>
            </button>
            <button id="settingsButton" class="icon-button settings-toggle" type="button" aria-label="打开设置">
              <span class="settings-icon" aria-hidden="true"></span>
            </button>
          </div>
        </header>

        <div id="viewfinder" class="viewfinder" role="button" tabindex="0" aria-label="选择照片">
          <img id="cameraPreview" alt="待拍摄图片预览" />
          <div id="emptyViewfinder" class="viewfinder-empty">
            <span class="pixel-face-mini">▣_▣</span>
            <strong>点击快门选择一张照片</strong>
            <small>当前阶段暂用相册代替拍摄</small>
          </div>
          <div id="manualStartPanel" class="manual-start" hidden>
            <p>照片已就位</p>
            <button id="startGenerateButton" class="pill-button primary-pill" type="button">开始生成</button>
          </div>
        </div>

        <p id="cameraHint" class="camera-hint">按下快门，生成今日照片审判。</p>

        <footer class="camera-dock">
          <div class="camera-mode-strip" data-setting="generationMode" aria-label="生成模式">
            <button type="button" data-value="auto">自动</button>
            <button type="button" data-value="receipt">小票</button>
            <button type="button" data-value="big_text">爆字</button>
            <button type="button" data-value="expression">表情</button>
          </div>
          <div class="camera-controls">
          <button id="galleryButton" class="thumbnail-button" type="button" aria-label="查看照片结果">
            <span id="latestThumb"></span>
          </button>
          <button id="shutterButton" class="shutter-button" type="button" aria-label="快门"></button>
          <button id="latestButton" class="round-tool flip-button" type="button" aria-label="镜头翻转">↻</button>
          </div>
        </footer>
      </section>

      <section id="generatingScreen" class="phone-screen generating-screen" hidden>
        <div class="generate-photo-wrap">
          <img id="generatingImage" alt="正在生成的图片" />
        </div>
        <div class="buddy-orbit" aria-hidden="true">
          <span>▣</span>
          <span>_</span>
          <span>▣</span>
        </div>
        <p class="product-kicker">Buddy is watching</p>
        <p id="generatingStep" class="generating-step">1/3</p>
        <h2 id="generatingTitle">正在认真看图……</h2>
        <div class="progress-rail"><span id="progressFill"></span></div>
        <p id="generatingMessage" class="generating-message">正在寻找槽点……</p>
      </section>

      <section id="resultScreen" class="phone-screen result-screen" hidden>
        <header class="result-topbar">
          <button id="backToCameraButton" class="round-tool result-back-button" type="button" aria-label="返回拍摄">‹</button>
          <div class="result-title">
            <p class="product-kicker">Roast Roll</p>
            <h2 id="recordCounter">1 / 1</h2>
          </div>
          <div class="result-top-actions">
            <button id="regenerateButton" class="icon-button result-icon-button regenerate-icon-button" type="button" aria-label="重新生成">
              <span aria-hidden="true"></span>
            </button>
            <button id="deleteRecordButton" class="icon-button result-icon-button delete-icon-button" type="button" aria-label="删除">
              <span aria-hidden="true"></span>
            </button>
          </div>
        </header>

        <div id="resultScroller" class="result-scroller">
          <img id="resultOriginalImage" class="result-original" alt="原始照片" />
          <div class="photo-info">
            <span id="recordTime">今天 14:32</span>
            <strong id="recordMode">Receipt Mode</strong>
          </div>
          <div id="ticketLongPreview" class="ticket-long-preview"></div>
        </div>
      </section>

      <div id="imageLightbox" class="image-lightbox" hidden>
        <button id="closeImageLightboxButton" class="icon-button lightbox-close" type="button" aria-label="关闭大图">×</button>
        <img id="lightboxImage" alt="原始照片大图" />
      </div>

      <div id="regenerateBackdrop" class="sheet-backdrop" hidden></div>
      <aside id="regenerateSheet" class="settings-sheet regenerate-sheet" hidden aria-label="重新生成设置">
        <button id="closeRegenerateButton" class="settings-collapse" type="button" aria-label="收起重新生成设置">
          <span></span>
        </button>

        <section class="setting-group">
          <h3>生成模式</h3>
          <div class="segmented-control intensity-control" data-regenerate-setting="generationMode">
            <button type="button" data-value="auto">自动</button>
            <button type="button" data-value="receipt">小票</button>
            <button type="button" data-value="big_text">爆字</button>
            <button type="button" data-value="expression">表情</button>
          </div>
        </section>

        <section class="setting-group">
          <h3>吐槽强度</h3>
          <div class="segmented-control intensity-control" data-regenerate-setting="roastLevel">
            <button type="button" data-value="gentle">温柔</button>
            <button type="button" data-value="normal">正常</button>
            <button type="button" data-value="spicy">辛辣</button>
            <button type="button" data-value="public_execution">处刑</button>
          </div>
        </section>

        <section class="setting-group">
          <h3>漫画</h3>
          <div class="segmented-control" data-regenerate-setting="sketchEnabled">
            <button type="button" data-value="off">关闭</button>
            <button type="button" data-value="on">开启</button>
          </div>
        </section>

        <section id="regenerateSketchDetailGroup" class="sketch-detail-group" hidden>
          <div class="option-list compact-options" data-regenerate-setting="sketchMode">
            <button type="button" data-value="top">顶部</button>
            <button type="button" data-value="bottom">底部</button>
            <button type="button" data-value="standalone">单独</button>
          </div>
        </section>

        <button id="confirmRegenerateButton" class="confirm-regenerate-button" type="button">确定重新生成</button>
      </aside>

      <div id="settingsBackdrop" class="sheet-backdrop" hidden></div>
      <aside id="settingsSheet" class="settings-sheet" hidden aria-label="设置面板">
        <button id="closeSettingsButton" class="settings-collapse" type="button" aria-label="收起设置">
          <span></span>
        </button>

        <section class="setting-group">
          <h3>触发方式</h3>
          <div class="segmented-control" data-setting="triggerMode">
            <button type="button" data-value="auto">自动生成</button>
            <button type="button" data-value="manual">手动开始</button>
          </div>
        </section>

        <section class="setting-group">
          <h3>吐槽强度</h3>
          <div class="segmented-control intensity-control" data-setting="roastLevel">
            <button type="button" data-value="gentle">温柔</button>
            <button type="button" data-value="normal">正常</button>
            <button type="button" data-value="spicy">辛辣</button>
            <button type="button" data-value="public_execution">处刑</button>
          </div>
        </section>

        <section class="setting-group">
          <h3>漫画</h3>
          <div class="segmented-control" data-setting="sketchEnabled">
            <button type="button" data-value="off">关闭</button>
            <button type="button" data-value="on">开启</button>
          </div>
        </section>

        <section id="sketchDetailGroup" class="sketch-detail-group" hidden>
          <div class="option-list compact-options" data-setting="sketchMode">
            <button type="button" data-value="top">顶部</button>
            <button type="button" data-value="bottom">底部</button>
            <button type="button" data-value="standalone">单独</button>
          </div>
        </section>
      </aside>

      <input id="productImageInput" type="file" accept="image/*" hidden />
    </main>

    <script type="module" src="./dist/product.js"></script>
  </body>
</html>
